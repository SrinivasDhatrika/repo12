name: Print Diamond

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Print Diamond Pattern
        run: |
          python3 -c "
          n = 5
          for i in range(n):
              print(' ' * (n - i - 1) + '*' * (2 * i + 1))
          for i in range(n - 2, -1, -1):
              print(' ' * (n - i - 1) + '*' * (2 * i + 1))
          "
